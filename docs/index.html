<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JavaScript Interview Questions — Study</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css"
      id="hljs-light"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"
      id="hljs-dark"
      disabled
    />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar" aria-label="Question list">
        <header class="sidebar-header">
          <h1 class="logo">JS Questions</h1>
          <label class="sr-only" for="search">Search questions</label>
          <input
            type="search"
            id="search"
            class="search"
            placeholder="Search by title…"
            autocomplete="off"
          />
          <p class="meta" id="meta"></p>
        </header>
        <nav class="question-list" id="list"></nav>
      </aside>
      <main class="main" id="main">
        <header class="main-header">
          <div class="main-toolbar">
            <button type="button" class="btn" id="prev" aria-label="Previous question">
              ← Prev
            </button>
            <button type="button" class="btn" id="next" aria-label="Next question">
              Next →
            </button>
            <button type="button" class="btn btn-ghost" id="theme-toggle" aria-label="Toggle theme">
              Theme
            </button>
          </div>
          <h2 class="question-title" id="question-title">Loading…</h2>
        </header>
        <article class="content markdown-body" id="content"></article>
      </main>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.1.1/marked.min.js"></script>
    <script defer src="js/app.js"></script>
  </body>
</html>
